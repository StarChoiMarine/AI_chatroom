<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1100" />
    <title>AI 원탁회의</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 상단바 -->
      <header class="topbar">
        <div class="title">🟣 <span id="roomTitle">AI 원탁회의</span></div>
        <div class="top-actions">
          <button id="btnCheckLogin" class="ghost">로그인 상태 확인</button>
          <button id="btnNewChat" class="ghost">새 대화</button>
          <button id="btnSettings" class="ghost">설정</button>
        </div>
      </header>

      <div class="main">
        <!-- 참가자 목록 -->
        <aside class="sidebar">
          <h3>참가자</h3>
          <ul id="participants">
            <li data-service="USER"><span class="dot user"></span><span class="pname">사용자</span></li>
            <li data-service="CHATGPT"><span class="dot"></span><span class="pname">ChatGPT</span><span class="pstatus">…</span></li>
            <li data-service="CLAUDE"><span class="dot"></span><span class="pname">Claude</span><span class="pstatus">…</span></li>
            <li data-service="GEMINI"><span class="dot"></span><span class="pname">Gemini</span><span class="pstatus">…</span></li>
          </ul>
          <div class="progress-box">
            <h4>진행 상황</h4>
            <div id="progressLog"></div>
          </div>
        </aside>

        <!-- 대화 영역 -->
        <section class="chat">
          <div id="messages" class="messages"></div>
          <div class="composer">
            <div class="composer-meta">
              <span>모드: <strong id="modeLabel">원탁회의</strong></span>
              <span class="hint">@ChatGPT · @Claude · @Gemini · @all 로 지목 · Enter 전송 / Shift+Enter 줄바꿈</span>
              <button id="btnAbort" class="danger" disabled>전체 중단</button>
            </div>
            <div class="composer-row">
              <textarea id="input" rows="2" placeholder="메시지를 입력하세요..."></textarea>
              <button id="btnSend" class="primary">전송</button>
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- 설정 모달 -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h2>설정</h2>
          <button id="btnCloseSettings" class="ghost">닫기</button>
        </div>
        <div class="modal-body" id="settingsBody"><!-- JS 생성 --></div>
        <div class="modal-foot">
          <button id="btnResetRoles" class="ghost">역할 기본값 복원</button>
          <button id="btnExportMd" class="ghost">Markdown 내보내기</button>
          <button id="btnExportJson" class="ghost">JSON 내보내기</button>
          <button id="btnSaveSettings" class="primary">설정 저장</button>
        </div>
      </div>
    </div>

    <!-- 새 대화 모달 -->
    <div id="newChatModal" class="modal hidden">
      <div class="modal-card small">
        <div class="modal-head"><h2>새 대화</h2></div>
        <div class="modal-body">
          <p>새 대화를 시작하시겠습니까?</p>
          <div class="stack">
            <button id="btnNewLocal" class="primary">로컬 대화 기록만 초기화</button>
            <button id="btnNewWeb" class="ghost">AI 웹사이트에서도 새 대화 생성</button>
            <button id="btnNewCancel" class="ghost">취소</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/vendor/marked.js"></script>
    <script src="/vendor/purify.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
